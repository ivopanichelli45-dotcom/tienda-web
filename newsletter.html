<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter - Conjuntos Prime</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white max-w-lg w-full rounded-2xl shadow-lg overflow-hidden">
      <div class="blur-circle circle-1"></div>
      <div class="blur-circle circle-2"></div>
        <header class="bg-black py-6 flex justify-center">
            <img
                src="imagenes/logo.jpg"
                alt="Logo de la tienda"
                class="w-40 h-auto"
            >
        </header>

        <!-- Contenido -->
        <main class="p-8">

            <h1 class="text-3xl font-bold text-center mb-4">
                ¡Hola Usuario!
            </h1>

            <p class="text-gray-600 text-center mb-8">
                Suscribite a nuestra newsletter y recibí ofertas exclusivas,
                novedades y acceso anticipado a productos limitados.
            </p>

            <form action="#" method="post" class="space-y-5">

                <!-- Nombre -->
                <div>
                    <label for="nombre" class="block font-semibold mb-2">
                        Nombre y Apellido
                    </label>
                    <input
                        type="text"
                        id="nombre"
                        name="nombre"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
                    >
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block font-semibold mb-2">
                        Email
                    </label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
                    >
                </div>

                <!-- Teléfono -->
                <div>
                    <label for="telefono" class="block font-semibold mb-2">
                        Teléfono
                    </label>
                    <input
                        type="tel"
                        id="telefono"
                        name="telefono"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
                    >
                </div>

                <!-- Provincia -->
                <div>
                    <label for="provincia" class="block font-semibold mb-2">
                        Provincia
                    </label>

                    <select
                        id="provincia"
                        name="provincia"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
                    >
                        <option value="">Seleccione una provincia</option>
                        <option>Buenos Aires</option>
                        <option>CABA</option>
                        <option>Catamarca</option>
                        <option>Chaco</option>
                        <option>Chubut</option>
                        <option>Córdoba</option>
                        <option>Corrientes</option>
                        <option>Entre Ríos</option>
                        <option>Formosa</option>
                        <option>Jujuy</option>
                        <option>La Pampa</option>
                        <option>La Rioja</option>
                        <option>Mendoza</option>
                        <option>Misiones</option>
                        <option>Neuquén</option>
                        <option>Río Negro</option>
                        <option>Salta</option>
                        <option>San Juan</option>
                        <option>San Luis</option>
                        <option>Santa Cruz</option>
                        <option>Santa Fe</option>
                        <option>Santiago del Estero</option>
                        <option>Tierra del Fuego</option>
                        <option>Tucumán</option>
                    </select>
                </div>

                <!-- Localidad -->
                <div>
                    <label for="localidad" class="block font-semibold mb-2">
                        Localidad
                    </label>

                    <input
                        type="text"
                        id="localidad"
                        name="localidad"
                        placeholder="Ej: Rosario, Ushuaia, Mar del Plata"
                        required
                        class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-black"
                    >
                </div>

                <!-- Términos -->
                <div class="flex items-start gap-3">
                    <input
                        type="checkbox"
                        id="terminos"
                        required
                        class="mt-1 h-4 w-4"
                    >

                    <label for="terminos" class="text-sm text-gray-700">
                        He leído y acepto los términos y condiciones y autorizo
                        el tratamiento de mis datos para recibir comunicaciones,
                        promociones y novedades de Conjuntos Prime.
                    </label>
                </div>

                <!-- Botón -->
                <button
                    type="submit"
                    class="w-full bg-black text-white py-3 rounded-lg font-bold hover:bg-gray-800 transition"
                >
                    Suscribirme
                </button>

            </form>

            <!-- Footer -->
            <div class="mt-8 text-center">
                <p class="font-bold text-lg">
                    Conjuntos Prime 2026
                </p>

                <a
                    href="index.html"
                    class="inline-block mt-4 text-black font-semibold hover:underline"
                >
                    Volver al inicio
                </a>
            </div>

        </main>

    </div>

</body>
</html>
